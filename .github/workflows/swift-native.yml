name: swift-native

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Archive binary
        run: |
          mkdir -p artifacts
          cp .build/release/wledcast-swift artifacts/wledcast-swift

      - name: Create zip
        run: |
          cd artifacts
          zip -r wledcast-swift-macos.zip wledcast-swift

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wledcast-swift-macos
          path: artifacts/wledcast-swift-macos.zip
